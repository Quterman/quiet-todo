<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Тихий список</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=task-note-1" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="workspace">
        <header class="topbar">
          <div class="brand-mark">
            <h1 id="app-title">Тихий список</h1>
          </div>
          <aside class="progress-card" aria-label="Прогресс задач">
            <div class="progress-meter">
              <div class="progress-copy">
                <span>Оценка дня</span>
                <strong id="progress-label">0%</strong>
              </div>
              <div
                class="progress-track"
                role="progressbar"
                aria-label="Выполнено задач на сегодня"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
              >
                <span id="progress-fill"></span>
              </div>
              <p id="progress-detail">Сегодняшняя цель пока пустая</p>
            </div>
          </aside>
          <section class="auth-panel" aria-label="Аккаунт">
            <div class="auth-copy">
              <strong id="auth-title">Проверяю вход...</strong>
            </div>
            <button class="auth-logout" id="auth-logout" type="button">Выйти</button>
          </section>
        </header>

        <nav class="section-tabs" aria-label="Разделы приложения">
          <button
            class="section-tab is-active"
            data-section="tasks"
            type="button"
            aria-selected="true"
          >
            Задачи
          </button>
          <button
            class="section-tab"
            data-section="stats"
            type="button"
            aria-selected="false"
          >
            Статистика
          </button>
        </nav>

        <section class="app-section is-active" id="tasks-section" data-section-panel="tasks">
          <section class="day-switcher" aria-label="Рабочий день">
            <button class="day-arrow" id="day-prev" type="button" aria-label="Предыдущий день">
              ←
            </button>
            <div class="day-switcher-copy">
              <span>Рабочий день</span>
              <strong id="active-day-title">15 июля</strong>
            </div>
            <button class="day-arrow" id="day-next" type="button" aria-label="Следующий день">
              →
            </button>
          </section>

          <div class="task-controls">
            <form class="composer is-expanded" id="task-form" aria-expanded="true">
              <label class="visually-hidden" for="task-input">Новая задача</label>
              <input
                id="task-input"
                name="task"
                type="text"
                autocomplete="off"
                placeholder="Что нужно сделать?"
                maxlength="90"
              />
              <button class="composer-submit" type="submit" aria-label="Добавить задачу">
                <span aria-hidden="true">+</span>
              </button>
              <button
                class="composer-close"
                id="composer-close"
                type="button"
                aria-label="Скрыть поле добавления"
                hidden
              >
                <span aria-hidden="true">×</span>
              </button>
            </form>
          </div>

          <section class="list-shell" aria-label="Задачи">
            <ul class="task-list" id="task-list"></ul>
            <div class="empty" id="empty-state" hidden>
              <div class="empty-mark" aria-hidden="true"></div>
              <h2>Тут пока тихо</h2>
              <p>Добавь одну маленькую задачу сверху. Даже “налить воды” считается.</p>
            </div>
          </section>

          <section class="day-tools" aria-label="Итоги дня">
            <div class="day-review" id="day-review" hidden>
              <div class="day-review-head">
                <h2>Как прошёл день?</h2>
                <div class="day-rating-options" aria-label="Оценка дня">
                  <button type="button" data-rating="1" aria-label="Оценка 1 из 5">★</button>
                  <button type="button" data-rating="2" aria-label="Оценка 2 из 5">★</button>
                  <button type="button" data-rating="3" aria-label="Оценка 3 из 5">★</button>
                  <button
                    class="is-active"
                    type="button"
                    data-rating="4"
                    aria-label="Оценка 4 из 5"
                  >
                    ★
                  </button>
                  <button type="button" data-rating="5" aria-label="Оценка 5 из 5">★</button>
                </div>
              </div>
              <label class="visually-hidden" for="day-note">Что запомнить?</label>
              <textarea
                id="day-note"
                name="day-note"
                rows="2"
                maxlength="220"
                placeholder="Что важно запомнить про этот день?"
              ></textarea>
              <div class="day-review-actions">
                <button class="day-review-submit" id="day-review-submit" type="button">
                  Сохранить итог
                </button>
                <button class="day-review-cancel" id="day-review-cancel" type="button">
                  Отмена
                </button>
              </div>
            </div>
            <button class="day-close" id="close-day" type="button">Закрыть день</button>
          </section>
        </section>

        <section class="app-section" id="stats-section" data-section-panel="stats" hidden>
          <section class="history" aria-label="История дней">
            <div class="history-head">
              <h2>Статистика</h2>
              <span id="history-count">0 дней</span>
            </div>
            <ol class="history-list" id="history-list"></ol>
            <div class="week-summary" id="week-summary" aria-live="polite"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="./supabase-client.js?v=task-note-1"></script>
    <script src="./script.js?v=task-note-1"></script>
  </body>
</html>
